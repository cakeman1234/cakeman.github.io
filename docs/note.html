<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Technical note viewer with table of contents, math rendering, and readable code formatting."
  >
  <title>Note Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="note.css">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
  >
</head>
<body>
  <a class="skip-link" href="#note-content">Skip to note content</a>

  <header class="site-header note-header">
    <div class="container nav-shell note-nav-shell">
      <a class="brand" href="index.html" aria-label="Go to homepage">
        <span class="brand-mark">JZ</span>
        <span class="brand-text">
          <strong>Jie Zheng</strong>
          <span>Note Viewer</span>
        </span>
      </a>

      <a class="nav-home" href="index.html">Home</a>

      <button
        class="menu-toggle toc-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="note-sidebar"
        aria-label="Toggle table of contents"
      >
        <span></span>
        <span></span>
      </button>

      <button class="theme-toggle" type="button" aria-label="Toggle color theme">
        <span class="theme-toggle-icon" aria-hidden="true"></span>
        <span class="theme-toggle-text">Theme</span>
      </button>
    </div>
  </header>

  <main class="note-page">
    <div class="container note-layout">
      <aside class="note-sidebar" id="note-sidebar" aria-label="Table of contents">
        <div class="surface-card sidebar-card">
          <p class="eyebrow">Contents</p>
          <h1 class="sidebar-title" id="note-title">Loading note...</h1>
          <p class="sidebar-path" id="note-path"></p>
          <nav class="toc-nav" id="toc-nav">
            <p class="toc-empty">The table of contents will appear here.</p>
          </nav>
        </div>
      </aside>

      <section class="note-main">
        <article class="surface-card note-article">
          <header class="note-meta">
            <p class="eyebrow">Technical Note</p>
            <h2 id="note-heading">Loading markdown...</h2>
          </header>
          <div class="note-content" id="note-content" aria-live="polite"></div>
        </article>
      </section>
    </div>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/bash.min.js"></script>
  <script src="note.js"></script>
</body>
</html>
